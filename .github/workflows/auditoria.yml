name: Auditoria Precios Janis-MELI

on:
  workflow_dispatch:

jobs:
  ejecutar-auditoria:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr auditoria Janis
        env:
          JANIS_API_KEY: ${{ secrets.JANIS_API_KEY }}
          JANIS_API_SECRET: ${{ secrets.JANIS_API_SECRET }}
          JANIS_CLIENT: ${{ secrets.JANIS_CLIENT }}
          MELI_SC_ID: ${{ secrets.MELI_SC_ID }}
          LIST_CHANNELS: '1'
        run: node auditoria-janis-meli.js

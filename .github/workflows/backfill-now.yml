name: Backfill Now (one-shot)

# Se dispara automáticamente al cambiar este archivo (push a main),
# así no depende del botón "Run workflow". Reescribe los rows con los
# campos nuevos (items + utm_campaign) para todo el histórico.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/backfill-now.yml"
  workflow_dispatch:

concurrency:
  group: backfill-now
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install googleapis axios

      - name: Backfill mayo 1 → junio 10
        env:
          VTEX_APP_KEY:   ${{ secrets.VTEX_APP_KEY }}
          VTEX_APP_TOKEN: ${{ secrets.VTEX_APP_TOKEN }}
          VTEX_ACCOUNT:   ${{ secrets.VTEX_ACCOUNT }}
        run: |
          start="2026-05-01"
          end="2026-06-10"
          current="$start"
          while [[ "$current" < "$end" ]] || [[ "$current" == "$end" ]]; do
            echo "▶ Processing $current..."
            node fetch-orders.js "$current" || echo "⚠ Error en $current, continuando..."
            current=$(date -d "$current + 1 day" +%Y-%m-%d)
            # Commit incremental para no perder progreso si algo falla
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/data/
            git diff --staged --quiet || git commit -m "backfill items+cupones: $current" -q
          done

      - name: Push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "backfill items+cupones: 2026-05-01 → 2026-06-10" -q
          for i in 1 2 3 4; do
            if git push; then break; fi
            echo "push falló, reintento en ${i}0s..."; sleep ${i}0
            git pull --rebase --autostash || true
          done

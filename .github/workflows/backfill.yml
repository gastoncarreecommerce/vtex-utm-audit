name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: "Fecha inicio (YYYY-MM-DD)"
        required: true
        default: "2026-05-01"
      date_to:
        description: "Fecha fin (YYYY-MM-DD)"
        required: true
        default: "2026-06-07"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install googleapis axios

      - name: Backfill dates
        env:
          VTEX_APP_KEY:   ${{ secrets.VTEX_APP_KEY }}
          VTEX_APP_TOKEN: ${{ secrets.VTEX_APP_TOKEN }}
          VTEX_ACCOUNT:   ${{ secrets.VTEX_ACCOUNT }}
        run: |
          start="${{ github.event.inputs.date_from }}"
          end="${{ github.event.inputs.date_to }}"
          current="$start"
          while [[ "$current" < "$end" ]] || [[ "$current" == "$end" ]]; do
            echo "▶ Processing $current..."
            node fetch-orders.js "$current" || echo "⚠ Error en $current, continuando..."
            current=$(date -d "$current + 1 day" +%Y-%m-%d 2>/dev/null || date -v+1d -j -f "%Y-%m-%d" "$current" +%Y-%m-%d)
          done

      - name: Commit all data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "backfill: ${{ github.event.inputs.date_from }} → ${{ github.event.inputs.date_to }}"
          git push

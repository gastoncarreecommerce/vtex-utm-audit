name: Fetch GA4 (Compra Online)

on:
  # Push a este archivo → backfill one-shot del histórico (mismo patrón que backfill-now.yml,
  # porque la integración no puede disparar workflow_dispatch por API)
  # Re-run: Analytics Data API ya habilitada en el proyecto GCP
  push:
    branches: [main]
    paths:
      - ".github/workflows/fetch-ga4.yml"
  schedule:
    - cron: "30 6 * * *"   # 6:30 UTC = 3:30am AR, después del fetch diario de pedidos
  workflow_dispatch:
    inputs:
      date_from:
        description: "Fecha inicio (YYYY-MM-DD). Vacío = ayer"
        required: false
        default: ""
      date_to:
        description: "Fecha fin (YYYY-MM-DD). Vacío = igual a inicio"
        required: false
        default: ""

concurrency:
  group: fetch-ga4
  cancel-in-progress: false

jobs:
  fetch-ga4:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install googleapis

      - name: Fetch GA4 events
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GA4_PROPERTY_ID:        ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          start="${{ github.event.inputs.date_from }}"
          end="${{ github.event.inputs.date_to }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            start="2026-05-01"
            end="2026-06-11"
          fi
          if [ -z "$start" ]; then
            node fetch-ga4.js
          else
            [ -z "$end" ] && end="$start"
            current="$start"
            while [[ "$current" < "$end" ]] || [[ "$current" == "$end" ]]; do
              node fetch-ga4.js "$current" || echo "⚠ Error en $current, continuando..."
              current=$(date -d "$current + 1 day" +%Y-%m-%d)
            done
          fi

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ga4/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ga4: $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4; do
            if git push; then break; fi
            echo "push falló, reintento..."; sleep ${i}0
            git pull --rebase --autostash || true
          done

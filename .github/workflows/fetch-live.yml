name: Fetch Live (Hoy)

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 minutos
  workflow_dispatch:

jobs:
  fetch-live:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install googleapis axios

      - name: Fetch today (Argentina time = UTC-3)
        env:
          VTEX_APP_KEY:   ${{ secrets.VTEX_APP_KEY }}
          VTEX_APP_TOKEN: ${{ secrets.VTEX_APP_TOKEN }}
          VTEX_ACCOUNT:   ${{ secrets.VTEX_ACCOUNT }}
        run: |
          TODAY=$(date -u --date='3 hours ago' +%Y-%m-%d)
          echo "▶ Fetching live data for: $TODAY"
          node fetch-orders.js "$TODAY"

      - name: Commit live data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "live: $(date -u +%Y-%m-%dT%H:%M)Z"
          git push

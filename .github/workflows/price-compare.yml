name: VTEX Price Compare PC1 vs PC5

on:
  workflow_dispatch:

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios csv-writer xlsx

      - name: Run price comparison
        env:
          VTEX_APP_KEY: ${{ secrets.VTEX_APP_KEY }}
          VTEX_APP_TOKEN: ${{ secrets.VTEX_APP_TOKEN }}
          VTEX_ACCOUNT: ${{ secrets.VTEX_ACCOUNT }}
        run: node price-compare.js

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: price-diff-pc1-vs-pc5
          path: |
            vtex-prices.csv
            janis-export.csv

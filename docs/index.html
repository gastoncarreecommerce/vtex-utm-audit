<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AppDash — Redirigiendo...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b0e1a 0%,#16182a 45%,#0f172a 100%);font-family:'Inter',system-ui,sans-serif;color:#fff}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:52px 48px;text-align:center;max-width:480px;width:90%;backdrop-filter:blur(20px);animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.icon{font-size:48px;margin-bottom:24px}
h1{font-size:22px;font-weight:700;margin-bottom:12px;letter-spacing:-.3px}
p{font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:28px}
a{display:inline-block;background:linear-gradient(135deg,#4f46e5,#4338ca);color:#fff;text-decoration:none;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:600;transition:transform .15s,box-shadow .15s}
a:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,70,229,.4)}
.countdown{font-size:12px;color:#5b6478;margin-top:20px}
</style>
</head>
<body>
<script>
// Si no estamos en GitHub Pages, ir directo al dashboard
if (!location.hostname.includes('github.io')) {
  location.replace('/app.html');
}
</script>
<div class="card">
  <div class="icon">📦</div>
  <h1>Nos mudamos</h1>
  <p>El dashboard ahora vive en una nueva dirección.<br>Vas a ser redirigido automáticamente en <strong id="n">5</strong> segundos.</p>
  <a href="https://appnativa-dashboard.vercel.app/">Ir ahora →</a>
  <div class="countdown">También podés actualizar tu favorito con el nuevo link.</div>
</div>
<script>
let s=5;
const el=document.getElementById("n");
const t=setInterval(()=>{ el.textContent=--s; if(s<=0){clearInterval(t);location.replace("https://appnativa-dashboard.vercel.app/");} },1000);
</script>
</body>
</html>
